<!-- Updated index.html with edit book functionality -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <title>Library Frontend</title>
    <style>
        body { font-family: Arial, sans-serif; background: #1e1e1e; color: #fff; margin: 0; padding: 20px; }
        h1, h2 { color: #4fc3f7; }
        .card { background: #2b2b2b; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        button { background: #4fc3f7; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:hover { background: #29b6f6; }
        input { padding: 8px; border-radius: 6px; border: none; width: 250px; margin-bottom: 10px; }
        .book-item { background: #333; padding: 12px; border-radius: 8px; margin: 8px 0; }
        .delete-btn { background: red; margin-left: 10px; }
        .edit-btn { background: orange; margin-left: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <h1>Frontend – Library API</h1>

    <!-- LOGIN -->
    <div class="card">
        <h2>Login</h2>
        <input type="email" id="email" placeholder="Correo"><br>
        <input type="password" id="password" placeholder="Contraseña"><br>
        <button onclick="login()">Iniciar sesión</button>
        <p id="loginStatus"></p>
    </div>

    <!-- APP -->
    <div id="app" class="hidden">
        <div class="card">
            <h2>Libros</h2>
            <button onclick="loadBooks()">Cargar libros</button>
            <div id="booksList"></div>
        </div>

        <!-- CREAR LIBRO -->
        <div class="card" id="adminSection">
            <h2>Crear libro</h2>
            <input id="title" placeholder="Título"><br>
            <input id="isbn" placeholder="ISBN"><br>
            <input id="year" type="number" placeholder="Año"><br>
            <input id="price" type="number" placeholder="Precio"><br>
            <input id="stock" type="number" placeholder="Stock"><br>
            <input id="cover" placeholder="URL portada"><br>
            <input id="authors" placeholder="IDs autores (1,2,3)"><br>
            <button onclick="createBook()">Crear libro</button>
            <p id="createStatus"></p>
        </div>

        <!-- EDITAR LIBRO -->
        <div class="card hidden" id="editCard">
            <h2>Editar libro</h2>
            <input id="edit_title" placeholder="Título"><br>
            <input id="edit_isbn" placeholder="ISBN"><br>
            <input id="edit_year" type="number" placeholder="Año"><br>
            <input id="edit_price" type="number" placeholder="Precio"><br>
            <input id="edit_stock" type="number" placeholder="Stock"><br>
            <input id="edit_cover" placeholder="URL portada"><br>
            <input id="edit_authors" placeholder="IDs autores (1,2,3)"><br>

            <button onclick="saveEdit()">Guardar</button>
            <button onclick="cancelEdit()">Cancelar</button>

            <p id="editStatus"></p>
        </div>

        <!-- AUTORES -->
        <div class="card">
            <h2>Autores</h2>
            <button onclick="loadAuthors()">Cargar autores</button>
            <div id="authorsList"></div>
        </div>
    </div>

<script>
const API_URL = "http://localhost:8000";
let token = null;
let userRole = null;
let editingBookId = null;

// LOGIN
async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const res = await fetch(`${API_URL}/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
    });

    if (!res.ok) {
        document.getElementById("loginStatus").innerText = "❌ Credenciales incorrectas";
        return;
    }

    const data = await res.json();
    token = data.access_token;
    localStorage.setItem("token", token);

    document.getElementById("loginStatus").innerText = "✅ Login exitoso";

    const payload = JSON.parse(atob(token.split('.')[1]));
    userRole = payload.role;

    document.getElementById("app").classList.remove("hidden");

    if (userRole !== "admin") {
        document.getElementById("adminSection").style.display = "none";
    }
}

// LISTAR LIBROS
async function loadBooks() {
    const res = await fetch(`${API_URL}/books`, {
        headers: { "Authorization": `Bearer ${token}` }
    });

    const books = await res.json();
    const container = document.getElementById("booksList");
    container.innerHTML = "";

    books.forEach(b => {
        const div = document.createElement("div");
        div.className = "book-item";
        div.innerHTML = `
            <strong>${b.title}</strong><br>
            Autores: ${b.authors || "-"}<br>
            Año: ${b.publication_year || "-"}<br>
            <button onclick="getBook(${b.id})">Ver</button>
            ${userRole === "admin" ? `<button class="edit-btn" onclick="editBook(${b.id})">Editar</button>` : ""}
            ${userRole === "admin" ? `<button class="delete-btn" onclick="deleteBook(${b.id})">Eliminar</button>` : ""}
        `;
        container.appendChild(div);
    });
}

// VER LIBRO
async function getBook(id) {
    const res = await fetch(`${API_URL}/books/${id}`, {
        headers: { "Authorization": `Bearer ${token}` }
    });

    const b = await res.json();
    alert(`Título: ${b.title}\nAutores: ${b.authors}`);
}

// ELIMINAR LIBRO
async function deleteBook(id) {
    if (!confirm("¿Eliminar libro?")) return;

    await fetch(`${API_URL}/books/${id}`, {
        method: "DELETE",
        headers: { "Authorization": `Bearer ${token}` }
    });

    loadBooks();
}

// CREAR LIBRO
async function createBook() {
    const book = collectFormData();

    const res = await fetch(`${API_URL}/books`, {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
        body: JSON.stringify(book)
    });

    if (!res.ok) {
        document.getElementById("createStatus").innerText = "❌ Error al crear libro";
        return;
    }

    document.getElementById("createStatus").innerText = "✅ Libro creado";
    loadBooks();
}

// --- EDITAR LIBRO ---
async function editBook(id) {
    editingBookId = id;

    const res = await fetch(`${API_URL}/books/${id}`, {
        headers: { "Authorization": `Bearer ${token}` }
    });

    const b = await res.json();

    // Cargar datos en inputs
    document.getElementById("edit_title").value = b.title;
    document.getElementById("edit_isbn").value = b.isbn || "";
    document.getElementById("edit_year").value = b.publication_year || "";
    document.getElementById("edit_price").value = b.price || "";
    document.getElementById("edit_stock").value = b.stock || "";
    document.getElementById("edit_cover").value = b.cover_image_url || "";
    document.getElementById("edit_authors").value = b.author_ids || "";

    document.getElementById("editCard").classList.remove("hidden");
}

function cancelEdit() {
    document.getElementById("editCard").classList.add("hidden");
}

// GUARDAR CAMBIOS
async function saveEdit() {
    const book = {
        title: document.getElementById("edit_title").value,
        isbn: document.getElementById("edit_isbn").value,
        publication_year: parseInt(document.getElementById("edit_year").value),
        price: parseFloat(document.getElementById("edit_price").value),
        stock: parseInt(document.getElementById("edit_stock").value),
        cover_image_url: document.getElementById("edit_cover").value,
        author_ids: document.getElementById("edit_authors").value.split(",").map(x => parseInt(x.trim()))
    };

    const res = await fetch(`${API_URL}/books/${editingBookId}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
        body: JSON.stringify(book)
    });

    if (!res.ok) {
        document.getElementById("editStatus").innerText = "❌ Error al editar libro";
        return;
    }

    document.getElementById("editStatus").innerText = "✅ Cambios guardados";
    document.getElementById("editCard").classList.add("hidden");
    loadBooks();
}

// AUTORES
async function loadAuthors() {
    const res = await fetch(`${API_URL}/authors`, {
        headers: { "Authorization": `Bearer ${token}` }
    });

    const authors = await res.json();
    const container = document.getElementById("authorsList");
    container.innerHTML = "";

    authors.forEach(a => {
        const div = document.createElement("div");
        div.className = "book-item";
        div.innerHTML = `<strong>${a.name}</strong> (${a.nationality || "-"})`;
        container.appendChild(div);
    });
}

function collectFormData() {
    return {
        title: document.getElementById("title").value,
        isbn: document.getElementById("isbn").value,
        publication_year: parseInt(document.getElementById("year").value),
        price: parseFloat(document.getElementById("price").value),
        stock: parseInt(document.getElementById("stock").value),
        cover_image_url: document.getElementById("cover").value,
        author_ids: document.getElementById("authors").value.split(',').map(x => parseInt(x.trim()))
    };
}
</script>
</body>
</html>
